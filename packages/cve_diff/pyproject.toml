[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "cve-diff"
version = "0.1.0"
description = "CVE patch analysis pipeline — discover, acquire, diff, and explain"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31",
    "typer>=0.12",
    "anthropic>=0.34",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
]

[project.scripts]
cve-diff = "cve_diff.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["cve_diff"]

[tool.pytest.ini_options]
# Register the ``integration`` marker so unit-test runs don't emit
# UnknownMarkWarning. Live-network probes (``TestOSVLive`` etc.) carry
# this marker and are deselected by default; opt in with ``-m
# integration``.
markers = [
    "integration: end-to-end tests that hit live network — deselected by default",
]
addopts = "-m 'not integration'"
